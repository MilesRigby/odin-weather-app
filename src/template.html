<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div id="page-content">

        <div id="daily-weather-disp" class="horizontal-scroll-window">

            <div class="scrollview-left scrollview-button"><p>&lt;</p></div>
            <div class="scrollview-right scrollview-button"><p>&gt;</p></div>

            <div class="scrollview-items">
                <div class="daily-weather-item">
                    <div class="daily-weather-date">24/02/2026</div>
                    <div class="daily-weather-data">
                        <div class="daily-weather-data-cell">
                            <p class="daily-weather-data-name">High</p>
                            <p class="daily-weather-data-value">17&deg;</p>
                        </div>
                        <div class="daily-weather-data-cell">
                            <p class="daily-weather-data-name">Rainfall</p>
                            <p class="daily-weather-data-value">2.1mm</p>
                        </div>
                        <div class="daily-weather-data-cell">
                            <p class="daily-weather-data-name">Coverage</p>
                            <p class="daily-weather-data-value">6okt</p>
                        </div>
                        <div class="daily-weather-data-cell">
                            <p class="daily-weather-data-name">Feels Like</p>
                            <p class="daily-weather-data-value">15&deg;</p>
                        </div>
                        <div class="daily-weather-data-cell">
                            <p class="daily-weather-data-name">Visibility</p>
                            <p class="daily-weather-data-value">4.3km</p>
                        </div>
                        <div class="daily-weather-data-cell">
                            <p class="daily-weather-data-name">UV Index</p>
                            <p class="daily-weather-data-value">2</p>
                        </div>
                        <div class="daily-weather-data-cell">
                            <p class="daily-weather-data-name">Low</p>
                            <p class="daily-weather-data-value">3&deg;</p>
                        </div>
                        <div class="daily-weather-data-cell">
                            <p class="daily-weather-data-name">Wind</p>
                            <p class="daily-weather-data-value">7mph</p>
                        </div>
                        <div class="daily-weather-data-cell">
                            <p class="daily-weather-data-name">Humidity</p>
                            <p class="daily-weather-data-value">73%</p>
                        </div>
                        </div>
                    </div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
                <div class="daily-weather-item"></div>
            </div>

        </div>

    </div>

</body>
</html>
